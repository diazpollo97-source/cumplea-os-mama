<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎂 Feliz Cumpleaños, Mamá</title>
    <!-- Font Awesome (íconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce4ec 0%, #f8e8ee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* TARJETA PRINCIPAL */
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 215, 215, 0.3);
            padding: 28px 24px 32px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 10;
            animation: cardEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.92) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ENCABEZADO */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 2.6rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #6b3f4a;
            text-shadow: 0 4px 12px rgba(190, 90, 120, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header h1 i {
            color: #e8436e;
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 8px rgba(232, 67, 110, 0.25));
        }

        .header .sub {
            color: #7f5a66;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 0.95rem;
            background: rgba(255, 220, 220, 0.4);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 200, 200, 0.3);
            margin-top: 4px;
        }

        /* GALERÍA DE FOTOS */
        .gallery {
            margin: 24px 0 22px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 12px 28px -8px rgba(80, 40, 50, 0.2);
            background: #fff5f7;
            position: relative;
        }

        .gallery-wrapper {
            overflow: hidden;
            position: relative;
        }

        .gallery-slider {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            gap: 4px;
            padding: 6px;
            background: #fff5f7;
        }

        .gallery-item {
            flex: 0 0 80%;
            scroll-snap-align: center;
            border-radius: 28px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background: #fae1e7;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            transition: transform 0.2s;
            margin: 0 4px;
            flex-shrink: 0;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }

        /* Indicadores de la galería */
        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 0 6px;
            background: #fff5f7;
        }

        .gallery-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dbb5c0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-dots .dot.active {
            background: #e8436e;
            width: 24px;
            border-radius: 4px;
        }

        /* CONTROLES MÚSICA + CORAZONES */
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin: 10px 0 18px;
        }

        .music-player {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 235, 238, 0.7);
            backdrop-filter: blur(4px);
            padding: 8px 18px 8px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255, 200, 200, 0.3);
        }

        .music-player button {
            background: #e8436e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 100%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 14px rgba(232, 67, 110, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-player button:hover {
            transform: scale(1.06);
            background: #d6335c;
            box-shadow: 0 8px 18px rgba(232, 67, 110, 0.45);
        }

        .music-player button:active {
            transform: scale(0.94);
        }

        .music-label {
            font-size: 0.85rem;
            color: #5d3e48;
            font-weight: 400;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .music-label i {
            color: #d45c7a;
        }

        .floating-hearts-toggle {
            background: rgba(255, 215, 215, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 180, 180, 0.4);
            border-radius: 100px;
            padding: 8px 20px;
            color: #7f4b5a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: default;
            font-weight: 400;
        }

        .floating-hearts-toggle i {
            color: #e8436e;
            font-size: 1.2rem;
        }

        /* CAJA DE REGALO (sorpresa) */
        .gift-box {
            background: linear-gradient(145deg, #fceaeef, #fadce4);
            border-radius: 40px;
            padding: 22px 16px 18px;
            margin: 16px 0 14px;
            text-align: center;
            border: 1px solid rgba(255, 200, 200, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(180, 80, 100, 0.08);
            position: relative;
            overflow: hidden;
        }

        .gift-box:hover {
            background: #fadce4;
            transform: scale(1.01);
            box-shadow: 0 12px 28px rgba(200, 90, 120, 0.15);
        }

        .gift-box:active {
            transform: scale(0.98);
        }

        .gift-box .gift-icon {
            font-size: 2.8rem;
            color: #bf4b6a;
            transition: 0.3s;
            display: block;
            margin-bottom: 4px;
        }

        .gift-box .gift-text {
            font-size: 1.05rem;
            color: #4f2e3a;
            font-weight: 500;
            letter-spacing: 0.6px;
        }

        .gift-box .gift-sorpresa {
            margin-top: 12px;
            font-size: 1.5rem;
            font-weight: 300;
            color: #a1556b;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(6px);
            border-radius: 100px;
            padding: 6px 12px;
            display: inline-block;
        }

        .gift-box.reveal .gift-sorpresa {
            opacity: 1;
            transform: translateY(0);
        }

        .gift-box.reveal .gift-icon {
            transform: scale(0.9) rotate(-5deg);
        }

        /* FOOTER y animaciones extra */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #9c6d7b;
            letter-spacing: 0.5px;
            font-weight: 300;
            border-top: 1px solid rgba(200, 150, 160, 0.15);
            padding-top: 18px;
        }

        .footer-note i {
            color: #e8436e;
        }

        /* CORAZONES FLOTANDO (contenedor) */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            bottom: -20px;
            font-size: 1.8rem;
            color: #f26b8a;
            opacity: 0.75;
            animation: floatUp linear forwards;
            pointer-events: none;
            filter: drop-shadow(0 6px 12px rgba(232, 67, 110, 0.2));
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(-110vh) scale(1.2) rotate(20deg); opacity: 0; }
        }

        /* diseño responsive */
        @media (max-width: 480px) {
            .card { padding: 20px 16px; border-radius: 36px; }
            .header h1 { font-size: 2.2rem; }
            .gallery-item { flex: 0 0 85%; }
            .music-player { padding: 6px 12px 6px 10px; }
            .music-player button { width: 34px; height: 34px; font-size: 1rem; }
        }

        /* animaciones de entrada para elementos */
        .fade-up {
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }
        .fade-up-d1 { animation-delay: 0.1s; }
        .fade-up-d2 { animation-delay: 0.25s; }
        .fade-up-d3 { animation-delay: 0.4s; }
        .fade-up-d4 { animation-delay: 0.55s; }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* botón de pausa en estado */
        .music-player .pause-icon {
            display: none;
        }
        .music-player.playing .play-icon {
            display: none;
        }
        .music-player.playing .pause-icon {
            display: inline-block;
        }

        /* detalle extra: gradiente suave en el fondo */
        .bg-blur-circle {
            position: fixed;
            border-radius: 100%;
            background: radial-gradient(circle, #ffe2ea, transparent 70%);
            filter: blur(60px);
            width: 500px;
            height: 500px;
            top: -100px;
            right: -100px;
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
        }
        .bg-blur-circle-2 {
            left: -150px;
            bottom: -100px;
            top: auto;
            background: radial-gradient(circle, #fbc4d3, transparent 70%);
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>

    <!-- fondos decorativos -->
    <div class="bg-blur-circle"></div>
    <div class="bg-blur-circle bg-blur-circle-2"></div>

    <!-- CORAZONES FLOTANDO (contenedor) -->
    <div id="heartsContainer" class="hearts-container"></div>

    <!-- TARJETA PRINCIPAL -->
    <div class="card">

        <!-- ENCABEZADO -->
        <div class="header fade-up">
            <h1>
                <i class="fas fa-birthday-cake"></i> 
                Feliz Cumpleaños, Mamá
                <i class="fas fa-heart" style="font-size: 2rem; color: #e8436e;"></i>
            </h1>
            <div class="sub"><i class="fas fa-star"></i> · Para la mejor mamá del mundo · <i class="fas fa-star"></i></div>
        </div>

        <!-- GALERÍA DE FOTOS con desplazamiento automático -->
        <div class="gallery fade-up fade-up-d1">
            <div class="gallery-wrapper">
                <div class="gallery-slider" id="gallerySlider">
                    <div class="gallery-item">
                        <img src="img/1782694173844.jpg" alt="Mi sonrisa favorita">
                    </div>
                    <div class="gallery-item">
                        <img src="img/1782694173856.jpg" alt="Celebrando juntos">
                    </div>
                    <div class="gallery-item">
                        <img src="img/1782694173895.jpg" alt="Momento especial">
                    </div>
                    <div class="gallery-item">
                        <img src="img/1782694173905.jpg" alt="Recuerdo bonito">
                    </div>
                    <div class="gallery-item">
                        <img src="img/IMG-20230420-WA0008.jpg" alt="Atardecer mágico">
                    </div>
                    <div class="gallery-item">
                        <img src="img/IMG-20250225-WA0049.jpg" alt="Día perfecto">
                    </div>
                </div>
            </div>
            <!-- Indicadores -->
            <div class="gallery-dots" id="galleryDots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
                <span class="dot" data-index="3"></span>
                <span class="dot" data-index="4"></span>
                <span class="dot" data-index="5"></span>
            </div>
        </div>

        <!-- FILA: MÚSICA + CORAZONES -->
        <div class="action-row fade-up fade-up-d2">
            <div class="music-player" id="musicPlayer">
                <button id="musicToggleBtn" aria-label="Reproducir/Pausar música">
                    <i class="fas fa-play play-icon"></i>
                    <i class="fas fa-pause pause-icon"></i>
                </button>
                <span class="music-label">
                    <i class="fas fa-music"></i> 
                    <span id="musicStatus">pausa</span>
                </span>
            </div>
            <div class="floating-hearts-toggle">
                <i class="fas fa-heart"></i> 
                <span>flotando</span>
                <i class="fas fa-arrow-up" style="font-size: 0.7rem; opacity: 0.7;"></i>
            </div>
        </div>

        <!-- CAJA DE REGALO (sorpresa al hacer clic) -->
        <div class="gift-box fade-up fade-up-d3" id="giftBox">
            <span class="gift-icon"><i class="fas fa-gift"></i></span>
            <div class="gift-text">🎁 ¡Toca para tu sorpresa, Mamá!</div>
            <div class="gift-sorpresa" id="giftReveal">
                <i class="fas fa-heart" style="color:#e8436e;"></i> 
                ¡Eres la mejor mamá del mundo! Te amo ❤️
                <i class="fas fa-heart" style="color:#e8436e;"></i>
            </div>
        </div>

        <!-- pie / mensaje -->
        <div class="footer-note fade-up fade-up-d4">
            <i class="fas fa-crown"></i> 
            Con todo mi cariño, para ti 
            <i class="fas fa-crown"></i>
        </div>

    </div>

    <script>
        (function() {
            "use strict";

            // ---------- CORAZONES FLOTANDO ----------
            const heartsContainer = document.getElementById('heartsContainer');
            let heartsInterval = null;
            let heartsActive = true;

            function createHeart() {
                if (!heartsActive) return;
                const heart = document.createElement('div');
                heart.classList.add('heart-float');
                heart.innerHTML = ['❤️','🌸','💖','✨','🩷','💗','🌺','💝'][Math.floor(Math.random() * 8)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (1.2 + Math.random() * 2.2) + 'rem';
                heart.style.animationDuration = (6 + Math.random() * 8) + 's';
                heart.style.opacity = 0.5 + Math.random() * 0.4;
                heartsContainer.appendChild(heart);

                setTimeout(() => {
                    if (heart.parentNode) heart.remove();
                }, 14000);
            }

            function startHearts() {
                if (heartsInterval) clearInterval(heartsInterval);
                heartsActive = true;
                for (let i = 0; i < 8; i++) setTimeout(createHeart, i * 300);
                heartsInterval = setInterval(createHeart, 500);
            }

            function stopHearts() {
                heartsActive = false;
                if (heartsInterval) {
                    clearInterval(heartsInterval);
                    heartsInterval = null;
                }
            }

            startHearts();

            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    stopHearts();
                } else {
                    startHearts();
                }
            });

            // ---------- GALERÍA AUTOMÁTICA ----------
            const slider = document.getElementById('gallerySlider');
            const dots = document.querySelectorAll('.dot');
            const items = slider.querySelectorAll('.gallery-item');
            const totalItems = items.length;
            let currentIndex = 0;
            let autoSlideInterval = null;
            let isTransitioning = false;

            // Función para mover el slider
            function goToSlide(index) {
                if (isTransitioning || index === currentIndex) return;
                isTransitioning = true;
                currentIndex = index;
                
                // Calcular el desplazamiento (80% del ancho + 4px de gap + 8px de padding)
                const itemWidth = items[0].offsetWidth + 8; // 4px gap + 4px margen
                const offset = currentIndex * itemWidth;
                slider.style.transform = `translateX(-${offset}px)`;
                
                // Actualizar dots
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentIndex);
                });

                setTimeout(() => {
                    isTransitioning = false;
                }, 650);
            }

            // Función para avanzar al siguiente slide
            function nextSlide() {
                const nextIndex = (currentIndex + 1) % totalItems;
                goToSlide(nextIndex);
            }

            // Iniciar el desplazamiento automático
            function startAutoSlide() {
                if (autoSlideInterval) clearInterval(autoSlideInterval);
                autoSlideInterval = setInterval(nextSlide, 3500);
            }

            // Detener el desplazamiento automático
            function stopAutoSlide() {
                if (autoSlideInterval) {
                    clearInterval(autoSlideInterval);
                    autoSlideInterval = null;
                }
            }

            // Evento para los dots (indicadores)
            dots.forEach((dot) => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    stopAutoSlide();
                    goToSlide(index);
                    setTimeout(startAutoSlide, 4000);
                });
            });

            // Pausar auto-slide cuando el usuario interactúa con el slider
            const galleryWrapper = document.querySelector('.gallery-wrapper');
            galleryWrapper.addEventListener('touchstart', function() {
                stopAutoSlide();
            });
            galleryWrapper.addEventListener('touchend', function() {
                setTimeout(startAutoSlide, 4000);
            });

            galleryWrapper.addEventListener('mouseenter', function() {
                stopAutoSlide();
            });
            galleryWrapper.addEventListener('mouseleave', function() {
                setTimeout(startAutoSlide, 2000);
            });

            // Iniciar el auto-slide
            setTimeout(startAutoSlide, 1000);

            // Recalcular en resize
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const itemWidth = items[0].offsetWidth + 8;
                    const offset = currentIndex * itemWidth;
                    slider.style.transition = 'none';
                    slider.style.transform = `translateX(-${offset}px)`;
                    setTimeout(() => {
                        slider.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                    }, 50);
                }, 200);
            });

            // ---------- MÚSICA ----------
            const musicBtn = document.getElementById('musicToggleBtn');
            const musicPlayerEl = document.getElementById('musicPlayer');
            const musicStatus = document.getElementById('musicStatus');

            let isPlaying = false;
            let audioCtx = null;
            let oscillator = null;
            let gainNode = null;

            function startSound() {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    oscillator = audioCtx.createOscillator();
                    gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.value = 523.25;
                    gainNode.gain.value = 0.08;
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start();
                    
                    gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(523, audioCtx.currentTime);
                    oscillator.frequency.linearRampToValueAtTime(659, audioCtx.currentTime + 0.3);
                    oscillator.frequency.linearRampToValueAtTime(587, audioCtx.currentTime + 0.6);
                    oscillator.frequency.linearRampToValueAtTime(523, audioCtx.currentTime + 0.9);
                    
                    setTimeout(() => {
                        if (oscillator) {
                            try { oscillator.stop(); } catch(e) {}
                        }
                    }, 3000);
                } catch(e) {
                    console.log('audio no disponible');
                }
            }

            function toggleMusic() {
                isPlaying = !isPlaying;
                if (isPlaying) {
                    musicPlayerEl.classList.add('playing');
                    musicStatus.innerText = 'sonando';
                    startSound();
                } else {
                    musicPlayerEl.classList.remove('playing');
                    musicStatus.innerText = 'pausa';
                    if (oscillator) {
                        try { oscillator.stop(); } catch(e) {}
                        oscillator = null;
                    }
                    if (audioCtx && audioCtx.state === 'running') {
                        audioCtx.close();
                        audioCtx = null;
                    }
                }
            }

            musicBtn.addEventListener('click', toggleMusic);

            document.addEventListener('click', function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }, { once: true });

            // ---------- CAJA DE REGALO ----------
            const giftBox = document.getElementById('giftBox');
            const giftReveal = document.getElementById('giftReveal');

            giftBox.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('reveal');
                if (this.classList.contains('reveal')) {
                    for (let i=0; i<10; i++) {
                        setTimeout(() => {
                            const h = document.createElement('div');
                            h.style.position = 'fixed';
                            h.style.left = (20 + Math.random() * 60) + '%';
                            h.style.top = (20 + Math.random() * 40) + '%';
                            h.style.fontSize = (1.8 + Math.random() * 2.5) + 'rem';
                            h.style.pointerEvents = 'none';
                            h.style.zIndex = '999';
                            h.innerHTML = ['🎉','🎊','💝','✨','🌟','💖','🎁','🌸','❤️','🌺'][Math.floor(Math.random()*10)];
                            h.style.transition = 'all 1.5s cubic-bezier(0.16, 1, 0.3, 1)';
                            h.style.opacity = '1';
                            h.style.transform = 'scale(1.2) rotate(10deg)';
                            document.body.appendChild(h);
                            setTimeout(() => {
                                h.style.opacity = '0';
                                h.style.transform = 'scale(2) translateY(-120px)';
                                setTimeout(() => h.remove(), 1600);
                            }, 100);
                        }, i * 120);
                    }
                }
            });

            window.addEventListener('touchmove', function(e) {
            }, { passive: true });

            console.log('🎂 ¡Feliz Cumpleaños, Mamá! ❤️');
            console.log('📸 Galería con desplazamiento automático');
        })();
    </script>
</body>
</html>
